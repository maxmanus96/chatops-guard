name: 'PR Quality Review'

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/**'
      - 'infra/**'
      - '.gitignore'
      - '.tflint.hcl'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'
      - 'plan.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "1"
  ACTIONLINT_VERSION: "1.7.12"
  ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"

jobs:
  workflow-lint:
    name: 'Workflow Lint'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/actionlint"
          archive="${install_dir}/actionlint.tar.gz"
          mkdir -p "${install_dir}"
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o "${archive}"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" -C "${install_dir}" actionlint
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint -color

  terraform-static-review:
    name: 'Terraform Static Review'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive infra

      - name: Terraform Init and Validate
        shell: bash
        run: |
          set -euo pipefail
          dirs=(
            infra/envs/dev
            infra/envs/dev-platform
            infra/modules/aks
            infra/modules/network
          )

          for dir in "${dirs[@]}"; do
            echo "::group::${dir}"
            terraform -chdir="${dir}" init -backend=false -input=false
            terraform -chdir="${dir}" validate
            echo "::endgroup::"
          done
