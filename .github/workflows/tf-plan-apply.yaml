name: 'Terraform Plan/Apply'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "1"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
  ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
  ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ARM_SKIP_PROVIDER_REGISTRATION: true
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # -------- TFLint --------
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init (downloads plugins if .tflint.hcl exists)
        run: tflint --init

      - name: Run TFLint
        run: tflint -f compact
        # set continue-on-error: true if you prefer warnings instead of failing PRs
        continue-on-error: false

      # -------- tfsec (security) --------
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: .
          # set to 'true' if you want PRs to show findings but not fail
          soft_fail: false

      # -------- Plan --------
      - name: Terraform Plan
        id: tf-plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color -input=false -out=tfplan
          ec=$?
          if [ $ec -eq 1 ]; then
            echo "exitcode=1" >> $GITHUB_OUTPUT
            echo "Terraform Plan Failed!"
            exit 1
          else
            echo "exitcode=$ec" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          if-no-files-found: error

      - name: Plan Summary
        id: tfplan-summary
        run: |
          sudo apt-get update >/dev/null && sudo apt-get install -y jq >/dev/null
          SUMMARY=$(terraform show -json tfplan | jq -r '
            .resource_changes
            | (map(.change.actions) // [])
            | { 
                create: map(index("create"))    | map(select(.!=null)) | length,
                update: map(index("update"))    | map(select(.!=null)) | length,
                delete: map(index("delete"))    | map(select(.!=null)) | length,
                replace: map(if (index("create") and index("delete")) then 1 else 0 end) | add // 0
              }
            | "create=\(.create) update=\(.update) delete=\(.delete) replace=\(.replace)"')
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

      - name: Publish Plan to Summary
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tfplan-summary.outputs.summary }}" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## Terraform Plan Summary\n${{ toJson(steps.tfplan-summary.outputs.summary) }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })

  terraform-apply:
    name: 'Terraform Apply'
    if: github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.tfplanExitCode == '2'
    runs-on: ubuntu-latest
    environment: production
    needs: [terraform-plan]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -lock-timeout=5m -auto-approve tfplan
