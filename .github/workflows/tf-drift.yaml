name: 'Terraform Configuration Drift Detection'

on:
  workflow_dispatch: 
  schedule:
    - cron: '41 3 * * *' # runs nightly at 3:41 am

#Special permissions required for OIDC authentication
permissions:
  id-token: write
  contents: read
  issues: write

#These environment variables are used by the terraform azure provider to setup OIDC (OpenID Connect) authentication. 
env:
  TF_IN_AUTOMATION: "1"
  TF_VERSION: "1.12.2"
  ARM_USE_OIDC: "true"
  ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
  ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"

jobs:
  terraform-plan:
    name: 'Terraform Plan (${{ matrix.environment }})'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(vars.TF_DRIFT_TARGET_ENVS || vars.TF_TARGET_ENVS || '["dev","dev-platform"]') }}
    env:
      #this is needed since we are running terraform with read-only permissions
      ARM_SKIP_PROVIDER_REGISTRATION: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_PLAN_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      TF_ENV: ${{ matrix.environment }}
      TF_ENV_DIR: infra/envs/${{ matrix.environment }}

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate target environment
      run: |
        case "${TF_ENV}" in
          dev|dev-platform) ;;
          *)
            echo "::error::Unsupported Terraform drift environment '${TF_ENV}'. Update the workflow allowlist before targeting a new root."
            exit 1
            ;;
        esac

    - name: Azure OIDC Login
      uses: azure/login@v3
      with:
        client-id: ${{ env.ARM_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Install the repo-pinned Terraform CLI instead of floating on latest.
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      run: terraform -chdir=${{ env.TF_ENV_DIR }} init -input=false

    # Generates an execution plan for Terraform
    # An exit code of 0 indicated no changes, 1 a terraform failure, 2 there are pending changes.
    - name: Terraform Plan
      id: tf-plan
      run: |
        export exitcode=0
        terraform -chdir=${{ env.TF_ENV_DIR }} plan -detailed-exitcode -no-color -input=false -out tfplan || export exitcode=$?
        
        echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
        
        if [ $exitcode -eq 1 ]; then
          echo Terraform Plan Failed!
          exit 1
        else 
          exit 0
        fi
        
    # Save plan to artifacts  
    - name: Publish Terraform Plan
      uses: actions/upload-artifact@v7
      with:
        name: tfplan-drift-${{ matrix.environment }}
        path: ${{ env.TF_ENV_DIR }}/tfplan
        
    # Create a redacted drift summary for issues and workflow summaries.
    # Keep the full binary plan in the workflow artifact instead of publishing
    # resource-level details into GitHub issues.
    - name: Create Redacted Drift Summary
      id: tf-plan-string
      run: |
        terraform -chdir="${TF_ENV_DIR}" show -json tfplan > "${TF_ENV_DIR}/tfplan.json"

        SUMMARY="$(python3 - "${TF_ENV_DIR}/tfplan.json" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as plan_file:
            plan = json.load(plan_file)

        counts = {"create": 0, "update": 0, "delete": 0, "replace": 0}
        for resource in plan.get("resource_changes") or []:
            actions = (resource.get("change") or {}).get("actions") or []
            action_set = set(actions)
            if {"create", "delete"}.issubset(action_set):
                counts["replace"] += 1
                continue
            for action in ("create", "update", "delete"):
                if action in action_set:
                    counts[action] += 1

        print(
            f"create={counts['create']} "
            f"update={counts['update']} "
            f"delete={counts['delete']} "
            f"replace={counts['replace']}"
        )
        PY
        )"
        
        delimiter="$(openssl rand -hex 8)"
        echo "summary<<${delimiter}" >> $GITHUB_OUTPUT
        echo "## Terraform Drift Summary (${TF_ENV})" >> $GITHUB_OUTPUT
        echo "${SUMMARY}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "Full Terraform plan output is intentionally not published to drift issues. Download the workflow artifact for deeper triage." >> $GITHUB_OUTPUT
        echo "${delimiter}" >> $GITHUB_OUTPUT
        
    # Publish Terraform Plan as task summary
    - name: Publish Terraform Plan to Task Summary
      env:
        SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
      run: |
        echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

    # If changes are detected, create a new issue
    - name: Open or update drift issue
      if: steps.tf-plan.outputs.exitcode == 2
      uses: actions/github-script@v9
      env:
        TF_ENV: "${{ env.TF_ENV }}"
        SUMMARY: "${{ steps.tf-plan-string.outputs.summary }}"
      with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `${process.env.SUMMARY}`;
            const title = `Terraform Configuration Drift Detected (${process.env.TF_ENV})`;
            const creator = 'github-actions[bot]'
          
            // Look to see if there is an existing drift issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: creator,
              per_page: 100
            })
              
            const issue = issues.data.find((candidate) => candidate.title === title)

            if (issue) {
              if ( issue.body == body ) {
                console.log('Drift Detected: Found matching issue with duplicate content')
              } else {
                console.log('Drift Detected: Found matching issue, updating body')
                github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: body
                })
              }
            } else {
              console.log('Drift Detected: Creating new issue')

              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body
             })
            }
            
    # If changes aren't detected, close any open drift issues
    - name: Close resolved drift issue
      if: steps.tf-plan.outputs.exitcode == 0
      uses: actions/github-script@v9
      env:
        TF_ENV: "${{ env.TF_ENV }}"
      with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Terraform Configuration Drift Detected (${process.env.TF_ENV})`;
            const creator = 'github-actions[bot]'
          
            // Look to see if there is an existing drift issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: creator,
              per_page: 100
            })
              
            const issue = issues.data.find((candidate) => candidate.title === title)

            if (issue) {
              github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              })
            } 
             
    # Mark the workflow as failed if drift detected 
    - name: Error on Failure
      if: steps.tf-plan.outputs.exitcode == 2
      run: exit 1
