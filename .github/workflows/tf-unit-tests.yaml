name: 'Terraform Unit Tests'

on:
  push:
    paths:
      - 'infra/**'
      - '.github/workflows/tf-unit-tests.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/tf-unit-tests.yaml'
  workflow_dispatch:

permissions:
  security-events: write # Needed to upload-sarif
  contents: read # Needed to clone repo
  actions: read # Potentially needed for private repositories (see https://github.com/github/codeql-action/issues/2117)

jobs:
  terraform-unit-tests:
    name: 'Terraform Unit Tests'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    # Initialize and validate the live bootstrap root, the dev platform root,
    # and reusable local modules when they exist.
    - name: Terraform Init
      run: |
        dirs="infra/envs/dev infra/envs/dev-platform"
        for module_dir in infra/modules/*; do
          if [ -d "$module_dir" ] && find "$module_dir" -maxdepth 1 -name '*.tf' -print -quit | grep -q .; then
            dirs="$dirs $module_dir"
          fi
        done
        for dir in $dirs; do
          terraform -chdir="$dir" init -backend=false
        done

    - name: Terraform Validate
      run: |
        dirs="infra/envs/dev infra/envs/dev-platform"
        for module_dir in infra/modules/*; do
          if [ -d "$module_dir" ] && find "$module_dir" -maxdepth 1 -name '*.tf' -print -quit | grep -q .; then
            dirs="$dirs $module_dir"
          fi
        done
        for dir in $dirs; do
          terraform -chdir="$dir" validate
        done

    - name: Terraform Format
      run: |
        dirs="infra/envs/dev infra/envs/dev-platform"
        for module_dir in infra/modules/*; do
          if [ -d "$module_dir" ] && find "$module_dir" -maxdepth 1 -name '*.tf' -print -quit | grep -q .; then
            dirs="$dirs $module_dir"
          fi
        done
        for dir in $dirs; do
          terraform -chdir="$dir" fmt -check -recursive
        done

  checkov-iac:
    name: 'Checkov IaC (${{ matrix.target.name }})'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: dev
            directory: infra/envs/dev
          - name: dev-platform
            directory: infra/envs/dev-platform

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Keep Checkov scoped to active roots. The dev-platform root exercises the
    # local network and AKS modules through real environment composition.
    - name: Run Checkov action
      id: checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: ${{ matrix.target.directory }}
        framework: terraform
        output_format: cli,sarif
        output_file_path: console,results.sarif

    - name: Upload SARIF file
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
        category: checkov-${{ matrix.target.name }}

  trivy-iac:
    name: 'Trivy IaC'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Trivy complements Checkov with a second IaC scanner. Image scanning is
    # deferred until this repo has a real Docker/ACR build path.
    - name: Run Trivy IaC scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: config
        scan-ref: infra
        hide-progress: true
        format: sarif
        output: trivy-results.sarif
        exit-code: '1'
        severity: CRITICAL,HIGH
        limit-severities-for-sarif: true

    - name: Upload Trivy SARIF file
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-results.sarif
        category: trivy-iac
