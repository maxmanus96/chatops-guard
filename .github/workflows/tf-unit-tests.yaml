name: 'Terraform Unit Tests'

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/tf-unit-tests.yaml'
  workflow_dispatch:

permissions:
  security-events: write # Needed to upload-sarif
  contents: read # Needed to clone repo
  actions: read # Potentially needed for private repositories (see https://github.com/github/codeql-action/issues/2117)

jobs:
  terraform-unit-tests:
    name: 'Terraform Unit Tests'
    runs-on: ubuntu-latest
    
    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # Install the latest version of Terraform CLI and configure the Terraform CLI configuration file with a Terraform Cloud user API token
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Initialize and validate the live dev root and the AKS module skeleton.
    - name: Terraform Init
      run: |
        for dir in infra/envs/dev infra/modules/aks; do
          terraform -chdir="$dir" init -backend=false
        done

    # Validate terraform files
    - name: Terraform Validate
      run: |
        for dir in infra/envs/dev infra/modules/aks; do
          terraform -chdir="$dir" validate
        done

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format
      run: |
        for dir in infra/envs/dev infra/modules/aks; do
          terraform -chdir="$dir" fmt -check -recursive
        done
    
    # Perform a security scan of the terraform code using checkov
    - name: Run Checkov action
      id: checkov
      uses: bridgecrewio/checkov-action@master
      with: 
        framework: terraform

    # Upload results to GitHub Advanced Security
    - name: Upload SARIF file
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
        category: checkov