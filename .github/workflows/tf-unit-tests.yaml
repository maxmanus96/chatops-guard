name: 'Terraform Unit Tests'

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/tf-unit-tests.yaml'
  workflow_dispatch:

permissions:
  security-events: write # Needed to upload-sarif
  contents: read # Needed to clone repo
  actions: read # Potentially needed for private repositories (see https://github.com/github/codeql-action/issues/2117)

jobs:
  terraform-unit-tests:
    name: 'Terraform Unit Tests'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    # Initialize and validate both the live dev root and the AKS module skeleton.
    - name: Terraform Init
      run: |
        for dir in infra/envs/dev infra/modules/aks; do
          terraform -chdir="$dir" init -backend=false
        done

    - name: Terraform Validate
      run: |
        for dir in infra/envs/dev infra/modules/aks; do
          terraform -chdir="$dir" validate
        done

    - name: Terraform Format
      run: |
        for dir in infra/envs/dev infra/modules/aks; do
          terraform -chdir="$dir" fmt -check -recursive
        done

    # Keep the blocking SARIF scan on the active dev root for now.
    # The AKS module is still a skeleton and its heavier hardening is being handled in issue #1.
    - name: Run Checkov action
      id: checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: infra/envs/dev
        framework: terraform
        output_format: cli,sarif
        output_file_path: console,results.sarif

    - name: Upload SARIF file
      if: success() || failure()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
        category: checkov
